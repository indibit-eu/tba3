type: object
required:
  - type
  - value
properties:
  type:
    type: string
    description: Type of characteristic
    examples:
      - languageAtHome
      - gender
      - SES
      - schoolType
  label:
    type: string
    description: Label for the characteristic
    examples:
      - Sprache zu Hause
      - Geschlecht
      - Sozioökonomischer Status
      - Schulart
  value:
    type: string
    description: Specific value of the characteristic
    examples:
      - german
      - male
      - low
      - gymnasium
