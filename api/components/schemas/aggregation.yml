type: object
required:
  - type
  - value
properties:
  type:
    type: string
    description: Aggregationsart (z.B. Kompetenzstandard, Aufgabe), eigene Aggregationsarten können definiert werden.
    examples:
      - competences
      - exercise
      - gender
  value:
    type: string
    description: Einzelne aggregierte Gruppe, z.B. der Aufgabenname, die Bezeichnung der Kompetenz, ...
    examples:
      - '2.5.3'
  includedIqbIds:
    type: array
    description: Liste von IQB ItemIds, die in der Berechnung der Aggregation berücksichtigt wurden.
    items:
      type: string
